<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list"></ul>
    <form id="product-form">
      <input type="text" id="product-name" placeholder="Tên sản phẩm" />
      <input type="number" id="product-price" placeholder="Giá (VND)" />
      <button type="submit">Thêm sản phẩm</button>
    </form>
    <script>
      const products = [
        { id: 1, name: "Bánh Chưng", price: 150000 },
        { id: 2, name: "Giò Lụa", price: 180000 },
        { id: 3, name: "Cành Đào", price: 500000 },
        { id: 4, name: "Mứt Tết", price: 120000 },
        { id: 5, name: "Bao Lì Xì ", price: 20000 },
        { id: 6, name: "Dưa Hấu", price: 60000 },
      ];

      const productList = document.getElementById("product-list");

      for (let i = 0; i < products.length; i++) {
        const li = document.createElement("li");

        const div = document.createElement("div");
        div.className = "product";

        const name = document.createElement("h3");
        name.textContent = products[i].name;

        const price = document.createElement("p");
        price.textContent = "Giá: " + products[i].price + " VND";

        div.appendChild(name);
        div.appendChild(price);
        li.appendChild(div);
        productList.appendChild(li);
      }
    </script>
  </body>
</html>
