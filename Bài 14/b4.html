<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Sản Phẩm Chợ Tết</title>
  </head>
  <body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>

    <ul id="product-list"></ul>

    <form id="product-form">
      <input type="text" id="product-name" placeholder="Tên sản phẩm" />
      <input type="number" id="product-price" placeholder="Giá (VND)" />
      <button type="submit">Thêm sản phẩm</button>
    </form>

    <script>
      const products = [
        { id: 1, name: "Bánh Chưng", price: 150000 },
        { id: 2, name: "Giò Lụa", price: 180000 },
        { id: 3, name: "Cành Đào", price: 500000 },
        { id: 4, name: "Mứt Tết", price: 120000 },
        { id: 5, name: "Bao Lì Xì", price: 20000 },
        { id: 6, name: "Dưa Hấu", price: 60000 },
      ];

      const productList = document.getElementById("product-list");
      const form = document.getElementById("product-form");
      const nameInput = document.getElementById("product-name");
      const priceInput = document.getElementById("product-price");

      function formatPrice(price) {
        return Number(price).toLocaleString("vi-VN") + " VND";
      }

      function renderProduct(product) {
        const li = document.createElement("li");
        li.className = "product-item";

        li.innerHTML = `
        <span class="product-name">${product.name}</span> - 
        <span class="product-price">${formatPrice(product.price)}</span>
        <button class="edit-price-btn">Sửa giá</button>
        <button class="delete-btn">Xóa</button>
    `;

        const deleteBtn = li.querySelector(".delete-btn");

        deleteBtn.addEventListener("click", function () {
          if (confirm("Bạn có chắc muốn xóa sản phẩm này?")) {
            li.remove();
          }
        });

        const editBtn = li.querySelector(".edit-price-btn");
        const priceSpan = li.querySelector(".product-price");

        editBtn.addEventListener("click", function () {
          let newPrice = prompt("Nhập giá mới (VND):");

          if (newPrice !== null && newPrice !== "" && !isNaN(newPrice)) {
            priceSpan.textContent = formatPrice(newPrice);
          }
        });

        productList.appendChild(li);
      }

      for (let i = 0; i < products.length; i++) {
        renderProduct(products[i]);
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = nameInput.value;
        const price = priceInput.value;

        const newProduct = {
          id: products.length + 1,
          name: name,
          price: price,
        };

        products.push(newProduct);

        renderProduct(newProduct);

        nameInput.value = "";
        priceInput.value = "";
      });
    </script>
  </body>
</html>
