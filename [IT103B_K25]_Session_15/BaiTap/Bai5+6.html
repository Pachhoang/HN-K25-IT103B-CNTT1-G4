<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            width: 300px;
            background-color: aqua;
            text-align: center;
            margin: auto;
        }

        .container {
            margin-top: 50px;
            width: 300px;
            height: 120px;
            text-align: center;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            border: 1px solid black;
            gap: 20px;
        }

        #add-btn {
            outline: none;
            background-color: greenyellow;
            border: none;
            padding: 5px 10px;
            border-radius: 40px;
            transition: all 0.2s ease-in;
        }

        #add-btn:hover {
            background-color: red;
            border: 1px solid rgb(70, 70, 89);
            transform: translateX(10px);
            scale: calc(1.3);
        }

        .jobList {
            margin-top: 20px;
            text-align: left;
        }

        .jobList ul li {
            display: flex;
            flex-direction: column;
        }

        .jobList ul {
            list-style: none;
        }
        .listItem{
            width: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* .input-div{
            margin-bottom: 20px;
        } */
    </style>
</head>

<body>
    <div class="container">
        <h2>To-Do List K24_PTIT</h2>
        <div class="input-div">
            <input type="text" id="input-Job" placeholder="Nhập nhiệm vụ...">
            <button id="add-btn">Thêm</button>
        </div>
        <p id = "message"></p>
    </div>
    <div class="jobList">
        <ul id="listToDo">
            
        </ul>
    </div>
    <script>
        let toDoList = [
            { id: 1, name: "Học DOM JS" , fontSize: 16},
            { id: 2, name: "Làm bài tập DOM JS", fontSize: 16},
        ];
        function newId(params) {
            let max = toDoList[0].id;
            toDoList.forEach(c => {
                if(c.id > max){
                    max = c.id;
                }
            });
            return max +1 ;
        }
        function renderTask(arr) {
            let list = document.getElementById("listToDo");
            if (arr.length === 0) {
                list.innerHTML = `<p>Không có Công việc nào</p>`;
            } else {
                list.innerHTML =  arr.map(c => `
                <li>
                <div class="listItem" data-id = "${c.id}">
                    <input type="checkbox">
                    <span class = "nameItem" style = "font-size: ${c.fontSize}px">${c.name}</span>
                    <button>Sửa</button>
                    <button>xóa</button>
                    <button class = "btn-up" data-id = "${c.id}">tăng</button>
                    <button class = "btn-down">giảm</button>
                    <br>
                    <br>
                </div>
                <hr>
            </li>`).join("");
            }

        }
        renderTask(toDoList);
        document.getElementById("add-btn").addEventListener("click", (e) => {
            let keyItem = document.getElementById("input-Job");
            if(keyItem.value === ""){
                document.getElementById("message").innerHTML = `<span style = "color: red">
                Không được để tên trống !
                </span>`
                keyItem.focus();
                return;
            }
            let newJob = {
                id: newId(toDoList.length),
                name: keyItem.value,
                fontSize: 16,
            };
            toDoList.push(newJob);
            keyItem.value = "";
            keyItem.focus();
            document.getElementById("message").innerHTML  = "";
            renderTask(toDoList);
        });
        document.getElementById("listToDo").addEventListener("click", (e) => {
                let idx = +e.target.closest(".listItem").dataset.id;
                let item =  toDoList.find(c => c.id === idx);
                if(e.target.classList.contains("btn-up")){
                    item.fontSize += 2;
                }
                if(e.target.classList.contains("btn-down")){
                    if(item.fontSize > 10){
                        item.fontSize -= 2;
                    }
                }
            renderTask(toDoList);
        });
    </script>
</body>

</html>
